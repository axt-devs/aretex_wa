repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        files: "aretex_wa"
        exclude: ".*\\.md$"
      - id: end-of-file-fixer
        files: "aretex_wa"
        exclude: ".*\\.md$"
      - id: check-merge-conflict
      - id: check-ast

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        files: "aretex_wa"
        args: ["--max-line-length=200", "--ignore=E501,W503,E128,E402,W605"]
