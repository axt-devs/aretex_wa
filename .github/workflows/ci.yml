name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: main-aretex_wa-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    name: Server

    services:
      redis-cache:
        image: redis:alpine
        ports:
          - 13000:6379
      redis-queue:
        image: redis:alpine
        ports:
          - 11000:6379
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements.txt', '**/pyproject.toml', '**/setup.py', '**/setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: ${{ steps.yarn-cache-dir-path.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install MariaDB Client
        run: |
          sudo apt update
          sudo apt-get install -y mariadb-client

      - name: Setup Frappe Bench
        run: |
          pip install frappe-bench
          bench init \
            --skip-redis-config-generation \
            --skip-assets \
            --python "$(which python)" \
            --frappe-branch version-16 \
            ~/frappe-bench
          mariadb --host 127.0.0.1 --port 3306 -u root -proot \
            -e "SET GLOBAL character_set_server = 'utf8mb4'"
          mariadb --host 127.0.0.1 --port 3306 -u root -proot \
            -e "SET GLOBAL collation_server = 'utf8mb4_unicode_ci'"

      - name: Install aretex_wa
        working-directory: /home/runner/frappe-bench
        run: |
          # 1. Copy app into bench apps folder
          cp -r $GITHUB_WORKSPACE apps/aretex_wa

          # 2. Ensure modules.txt and patches.txt exist inside the Python package
          #    Frappe REQUIRES these files — create them if missing
          touch apps/aretex_wa/aretex_wa/modules.txt
          touch apps/aretex_wa/aretex_wa/patches.txt

          # 3. Install Python package into bench virtualenv
          ./env/bin/pip install -q -e apps/aretex_wa

          # 4. Register app with Frappe (add to apps.txt)
          echo "aretex_wa" >> sites/apps.txt

          # 5. Install dev test dependencies
          bench setup requirements --dev

          # 6. Create site
          bench new-site \
            --db-root-password root \
            --admin-password admin \
            test_site

          # 7. Install app on site
          bench --site test_site install-app aretex_wa
        env:
          CI: 'Yes'

      - name: Run Tests
        working-directory: /home/runner/frappe-bench
        run: |
          bench --site test_site set-config allow_tests true
          bench --site test_site run-tests --app aretex_wa
        env:
          TYPE: server
